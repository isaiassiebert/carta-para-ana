<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta para Anjinha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="envelope-wrapper" id="envelope">
            <div class="envelope">
                <div class="capa"></div>
                <div class="corpo"></div>
                <div class="selo-coracao">❤️</div>
            </div>
            <p class="instrucao">Você recebeu uma carta. Clique para abrir...</p>
        </div>

        <div class="carta-conteudo hidden" id="carta">
            <h1 class="titulo-carta">Título da Carta Aqui</h1>
            <div class="texto-carta">
                <p>Aqui ficará o seu texto personalizado...</p>
                <p>Você pode escrever quantos parágrafos quiser para deixar o momento ainda mais especial.</p>
            </div>
            <p class="assinatura">Com todo o meu amor,</p>
            <p class="assinatura-nome">Seu Nome</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
